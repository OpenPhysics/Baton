name: CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      run-tests:
        type: boolean
        default: false

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so the fleet
# does not burn minutes on builds that a newer commit already obsoletes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        uses: OpenPhysics/Baton/.github/actions/security-audit@main

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test
        if: inputs.run-tests
        run: npm test

      - name: Build
        run: npm run build
