name: CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      run-tests:
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          echo "## Security Audit Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          npm audit --audit-level=moderate --json > audit.json || true
          node <<'NODE'
          const fs = require( 'fs' );
          const summary = process.env.GITHUB_STEP_SUMMARY;
          const audit = JSON.parse( fs.readFileSync( 'audit.json', 'utf8' ) );
          const counts = audit.metadata?.vulnerabilities ?? {};
          const lines = [
            `- Total: ${counts.total ?? 0}`,
            `- Moderate: ${counts.moderate ?? 0}`,
            `- High: ${counts.high ?? 0}`,
            `- Critical: ${counts.critical ?? 0}`
          ];
          fs.appendFileSync( summary, `${lines.join( '\n' )}\n` );
          if ( ( counts.high ?? 0 ) > 0 || ( counts.critical ?? 0 ) > 0 ) {
            fs.appendFileSync( summary, 'High or critical vulnerabilities found.\n' );
            process.exit( 1 );
          }
          if ( ( counts.total ?? 0 ) === 0 ) {
            fs.appendFileSync( summary, 'No vulnerabilities found at moderate severity or above.\n' );
          }
          NODE

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test
        if: inputs.run-tests
        run: npm test

      - name: Build
        run: npm run build
