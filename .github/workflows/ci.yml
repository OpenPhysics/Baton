name: CI

on:
  workflow_call:
    inputs:
      node-version:
        # Default Node version for the fleet. Single source of truth: this default
        # is mirrored in deploy.yml and fleet-health.yml — bump all three together.
        # See Baton/README.md ("Node version").
        type: string
        default: "24"
      run-tests:
        # Tri-state: "true" forces the test step on, "false" forces it off, and the
        # default "" means auto — run tests when the repo defines a "test" npm script.
        # String (not boolean) so "unset" is distinguishable from "off".
        type: string
        default: ""

permissions:
  contents: read

# No concurrency block here: this workflow is workflow_call-only, and callers
# already define the ci-${{ github.workflow }}-${{ github.ref }} group. Declaring
# the same group in the called workflow makes GitHub detect a deadlock with the
# caller's run and kill the reusable call at startup, so the build never runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        uses: OpenPhysics/Baton/.github/actions/security-audit@main

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      # Run tests when run-tests is "true", or when it is unset ("") and the repo
      # defines a "test" script. Skipped only when run-tests is explicitly "false"
      # or no test script exists. Keeps testless sims green with no per-repo config.
      - name: Test
        if: inputs.run-tests != 'false'
        run: |
          set -euo pipefail
          if [ "${{ inputs.run-tests }}" = "true" ]; then
            npm test
          elif jq -e '.scripts.test // empty' package.json >/dev/null 2>&1; then
            npm test
          else
            echo "No \"test\" script defined and run-tests not forced; skipping."
          fi

      - name: Build
        run: npm run build
