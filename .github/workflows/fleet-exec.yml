name: Fleet Exec

# Manually fan a change out across OpenPhysics repos: clone each, run a command,
# and (when apply=true) open one PR per repo. Defaults to a dry-run that only
# prints diffs. Powered by scripts/fleet-exec.sh.

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run in each repo (e.g. npm pkg set dependencies.vite=^8.1.0). Not needed when check_auth=true.'
        type: string
        required: false
        default: ''
      target:
        description: Which repos to target
        type: choice
        options:
          - simulation
          - all
        default: simulation
      only:
        description: Target a single repo by name (overrides target; for one-PR runs / smoke tests)
        type: string
        default: ''
      check_auth:
        description: Read-only preflight — verify the token can push to the targeted repos, then exit. Opens nothing.
        type: boolean
        default: false
      branch:
        description: Branch to create in each repo
        type: string
        default: chore/fleet-update
      title:
        description: PR title
        type: string
        default: 'chore: fleet update'
      install:
        description: Run npm install before the command (needed for lint/build codemods)
        type: boolean
        default: false
      apply:
        description: Open PRs (off = dry-run, prints diffs only)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: fleet-exec
  cancel-in-progress: false

jobs:
  fleet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Run fleet-exec
        env:
          # Pushing branches / opening PRs in other repos needs a token with write
          # access to them. The default GITHUB_TOKEN only reaches this repo, so set
          # an org PAT or GitHub App token as the FLEET_PAT secret for apply=true.
          # Setup steps: doc/fleet-auth.md
          GH_TOKEN: ${{ secrets.FLEET_PAT || github.token }}
          # Inputs are passed via env (never interpolated into the script) so an
          # operator-supplied command cannot break out of the run step.
          COMMAND: ${{ inputs.command }}
          TARGET: ${{ inputs.target }}
          ONLY: ${{ inputs.only }}
          BRANCH: ${{ inputs.branch }}
          TITLE: ${{ inputs.title }}
          DO_INSTALL: ${{ inputs.install }}
          DO_APPLY: ${{ inputs.apply }}
          DO_CHECK_AUTH: ${{ inputs.check_auth }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$ONLY" ]; then
            args+=(--only "$ONLY")
          elif [ "$TARGET" = "simulation" ]; then
            args+=(--simulation)
          fi
          if [ "$DO_CHECK_AUTH" = "true" ]; then
            bash scripts/fleet-exec.sh "${args[@]}" --check-auth
            exit $?
          fi
          if [ -z "$COMMAND" ]; then
            echo "command is required unless check_auth=true" >&2
            exit 2
          fi
          [ "$DO_INSTALL" = "true" ] && args+=(--install)
          [ "$DO_APPLY" = "true" ] && args+=(--apply)
          bash scripts/fleet-exec.sh "${args[@]}" \
            --branch "$BRANCH" --title "$TITLE" \
            -- bash -lc "$COMMAND"
