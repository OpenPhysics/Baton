name: Shared CodeQL analysis

on:
  workflow_call:
    inputs:
      source-path:
        description: Path to analyze (defaults to repository root)
        type: string
        default: "."

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
          source-root: ${{ inputs.source-path }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.37.1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
