name: Optimize Assets

# Regenerate the WebP landing-page thumbnails from the committed full-size
# screenshots and commit them back. Keeps docs/assets/*.webp in sync with
# screenshots/*.png without anyone running `npm run thumbnails` by hand.
#
# Heavy per-sim screenshot capture (scripts/generate-screenshots.sh) still runs
# manually, since it needs every sim repo checked out and built.

on:
  push:
    branches: [main]
    paths:
      - "screenshots/**"
      - "structure/repos.json"
      - "scripts/make-thumbnails.mjs"
      - ".github/workflows/optimize-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: optimize-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Regenerate WebP thumbnails
        run: npm run thumbnails

      - name: Commit refreshed thumbnails
        run: |
          if [ -n "$(git status --porcelain docs/assets)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/assets
            git commit -m "chore: refresh WebP thumbnails [skip ci]"
            git push
          else
            echo "Thumbnails already up to date."
          fi
