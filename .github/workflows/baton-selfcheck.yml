name: Baton self-check

# Validates Baton's own invariants — the skills collection is well-formed and its
# README index is in sync, the fleet Node version agrees across workflows, and the
# helper scripts are syntactically valid. These guard against the kind of drift that
# otherwise rots silently as the repo grows.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - ".claude-plugin/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - "skills/**"
      - ".claude-plugin/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Validate the skills collection
        run: scripts/check-skills.sh

      - name: Check fleet Node version is in sync
        run: scripts/check-node-version.sh

      - name: Lint shell scripts (syntax)
        run: |
          set -euo pipefail
          find scripts -name '*.sh' -print0 | while IFS= read -r -d '' s; do
            echo "bash -n $s"
            bash -n "$s"
          done

      - name: Lint shell scripts (shellcheck)
        # ubuntu-latest ships shellcheck. -x follows `source` into lib/repos.sh.
        # SC2034 is excluded: caller scripts set FILTER_*/REPOS_JSON globals that
        # are read inside the sourced lib's functions, which shellcheck can't track
        # across that boundary and wrongly reports as unused.
        run: |
          set -euo pipefail
          find scripts -name '*.sh' -print0 \
            | xargs -0 shellcheck -x -S warning -e SC2034
