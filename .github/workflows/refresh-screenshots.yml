name: Refresh Screenshot Thumbnails

# Capture live GitHub Pages sims, regenerate card WebP thumbs, and open a PR.
# Prefer this over building every sim in CI — Pages is already the deployed artifact.

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch:
    inputs:
      repos:
        description: "Optional space/comma-separated sim names (default: all active sims)"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-screenshots
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v7.0.0
        with:
          # Mirrors the fleet Node default in ci.yml / deploy.yml / fleet-health.yml.
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture live Pages screenshots
        env:
          ONLY: ${{ inputs.repos }}
        run: |
          set -euo pipefail
          mkdir -p screenshots
          mapfile -t SIMS < <(node -e '
            const catalog = require("./structure/repos.json");
            const only = (process.env.ONLY || "").split(/[\s,]+/).filter(Boolean);
            const sims = catalog.repos
              .filter((r) => r.isSimulation && r.status === "active" && r.framework === "SceneryStack")
              .map((r) => r.name)
              .filter((n) => only.length === 0 || only.includes(n));
            console.log(sims.join("\n"));
          ')
          for sim in "${SIMS[@]}"; do
            url="https://openphysics.github.io/${sim}/?screens=1"
            echo "Capturing ${sim} from ${url}"
            npx playwright screenshot \
              --browser chromium \
              --viewport-size=1154,753 \
              --wait-for-timeout=4000 \
              "$url" "screenshots/${sim}.png" || echo "::warning::Failed to capture ${sim}"
          done

      - name: Make card thumbnails
        run: node scripts/make-thumbnails.mjs

      - name: Regenerate Pages index
        run: scripts/generate-pages-index.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          commit-message: "chore: refresh Pages screenshot thumbnails"
          title: "chore: refresh Pages screenshot thumbnails"
          body: |
            Automated weekly (or manual) refresh of Baton card screenshots from live GitHub Pages.

            - Captured `screenshots/*.png` from `https://openphysics.github.io/<Sim>/`
            - Regenerated `docs/assets/*.webp` via `make-thumbnails.mjs`
            - Regenerated `docs/index.html` via `generate-pages-index.sh`
          branch: chore/refresh-screenshots
          delete-branch: true
